[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# JS et JSON : pas de cache long pour voir les mises à jour immédiatement
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap : Content-Type explicite pour que Google puisse le lire
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
