[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect lien externe cassé — Google crawlait https://onmangequoi.eu/5) (404 depuis 06/2023)
[[redirects]]
  from = "/5)"
  to = "/"
  status = 301

# JS et JSON : pas de cache long pour voir les mises à jour immédiatement
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap : Content-Type explicite pour que Google puisse le lire
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
