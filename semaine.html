<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu de la semaine — On mange quoi ?</title>
  <meta name="description" content="Menu hebdomadaire familial sain — On mange quoi ?">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231B4332'/><circle cx='16' cy='16' r='11' fill='none' stroke='white' stroke-width='2'/><circle cx='16' cy='16' r='6.5' fill='none' stroke='white' stroke-width='1.8'/></svg>">
  <link rel="canonical" href="https://onmangequoi.eu/semaine.html">
  <link rel="stylesheet" href="semaine.css">
  <!-- Statistiques de fréquentation — Plausible Analytics (sans cookies, RGPD-compatible) -->
  <script async src="https://plausible.io/js/pa-ZaRseIh-nGhXVtbtWwn2-.js"></script>
  <script>window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};plausible.init()</script>
</head>
<body>

  <header class="semaine-header">
    <button class="semaine-header-back" onclick="window.history.back()" title="Retour">←</button>
    <span class="semaine-logo">🥗 On mange quoi ?</span>
    <span class="semaine-score" id="semaine-score"></span>
  </header>

  <main class="semaine-main">
    <div class="semaine-date" id="semaine-date"></div>

    <div class="semaine-grid" id="semaine-grid">
      <div class="semaine-loading">Chargement du menu…</div>
    </div>

    <div class="health-legend">
      <p class="health-legend__title">🥗 Légende des risques</p>
      <div class="health-legend__items">
        <span class="legend-item">
          <span class="legend-dot" style="background: var(--risk-low)"></span>
          <span class="legend-label">Risque faible</span>
        </span>
        <span class="legend-item">
          <span class="legend-dot" style="background: var(--risk-medium)"></span>
          <span class="legend-label">Risque modéré</span>
        </span>
        <span class="legend-item">
          <span class="legend-dot" style="background: var(--risk-high)"></span>
          <span class="legend-label">Risque élevé</span>
        </span>
      </div>
    </div>

    <!-- ── Bannière newsletter ──────────────────────────────── -->
    <div class="newsletter-strip" id="newsletter-strip">
      <div class="newsletter-strip__left">
        <span class="newsletter-strip__title">Le menu santé, chaque lundi</span>
      </div>
      <form class="newsletter-strip__form" id="newsletter-form" novalidate>
        <input
          type="email"
          id="newsletter-email"
          class="newsletter-strip__input"
          placeholder="votre@email.com"
          autocomplete="email"
          required
        />
        <button type="submit" class="newsletter-strip__btn" id="newsletter-submit">
          S'abonner →
        </button>
      </form>
    </div>

    <footer class="semaine-footer">
      onmangequoi.eu · Menu complet, liste de courses et budget sur le site
    </footer>

    <div class="semaine-actions">
      <button class="semaine-btn semaine-btn--share" id="btn-partager">Partager ce lien</button>
    </div>
  </main>

  <script src="semaine.js"></script>

  <!-- ── Fiche technique modale ───────────────────────────── -->
  <div class="fiche-overlay" id="fiche-overlay" role="dialog" aria-modal="true" aria-labelledby="fiche-title">
    <div class="fiche-modal" id="fiche-modal">
      <button class="fiche-close" id="fiche-close" aria-label="Fermer">×</button>

      <div class="fiche-header">
        <span class="fiche-icon" id="fiche-icon"></span>
        <div class="fiche-header-text">
          <div class="fiche-meal-type" id="fiche-meal-type"></div>
          <h2 class="fiche-title" id="fiche-title"></h2>
          <div class="fiche-meta" id="fiche-meta"></div>
        </div>
      </div>

      <div class="fiche-profiles">
        <button class="fiche-profile-btn" data-profile="famille_jeunes_enfants">Famille</button>
        <button class="fiche-profile-btn" data-profile="couple">Couple</button>
        <button class="fiche-profile-btn" data-profile="solo">Solo</button>
      </div>

      <div class="fiche-section">
        <h3 class="fiche-section-label">Ingrédients</h3>
        <ul class="fiche-ingredients" id="fiche-ingredients"></ul>
      </div>

      <div class="fiche-section">
        <h3 class="fiche-section-label">Préparation</h3>
        <ol class="fiche-steps" id="fiche-steps"></ol>
      </div>

      <p class="fiche-note" id="fiche-note"></p>
    </div>
  </div>
</body>
</html>
